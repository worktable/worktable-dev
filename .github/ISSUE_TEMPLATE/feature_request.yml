name: Feature request
description: Something Worktable should do
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do?
      description: The workflow or problem behind the request matters more than the feature itself.
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: What would you like Worktable to do?
    validations:
      required: true
